name: hello-workflow
target: workflow
model: claude-sonnet-4-6
# Workflow steps run in single-turn mode, where the permission engine has
# no interactive surface to prompt on — any tool whose default verdict is
# `ask` is converted to `deny`. The Bash tool is `destructive: true` and
# falls through to `ask` by default, so it must be allowed explicitly
# here for step 1 to actually run `ls -la`.
permissions:
  rules:
    - { type: alwaysAllow, pattern: Bash }
steps:
  - name: list-files
    instructions: |
      Use the bash tool to run `ls -la` in the current directory.
      Report what you find in 1-3 short sentences (file types, sizes, anything notable).
      Do not editorialize beyond what the listing shows.
    tools:
      - bash
  - name: summarize
    instructions: |
      You will receive the previous step's directory listing as context.
      Write a single-paragraph summary describing what kind of project this
      directory contains based on the files you see. Do not call any tools.
