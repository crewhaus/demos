name: hello-voice
target: voice
agent:
  model: gpt-4o-realtime-preview
  instructions: |
    You are a brief voice assistant. Answer the user's spoken question in
    one short sentence (≤ 25 words). Speak naturally; the SDK handles audio.
voice:
  provider: openai
  voiceId: alloy
  vad: server
  bargeInTriggerFrames: 4
  bargeInWindowMs: 200
permissions:
  mode: default
