# hello-openclaw — a local-first, always-on, multi-channel personal AI
# assistant in the spirit of OpenClaw (https://docs.openclaw.ai). One
# YAML compiles to a long-running daemon that listens on Slack,
# Telegram, AND Discord simultaneously, runs one model turn per inbound
# message, and replies in the same thread.
#
# 🦞 EXFOLIATE! EXFOLIATE!
#
# Usage:
#   bun run compile:hello-openclaw
#   ANTHROPIC_API_KEY=... \
#     SLACK_BOT_TOKEN=... SLACK_SIGNING_SECRET=... \
#     TELEGRAM_BOT_TOKEN=... TELEGRAM_SECRET_TOKEN=... \
#     DISCORD_APP_ID=... DISCORD_BOT_TOKEN=... DISCORD_PUBLIC_KEY=... \
#     bun run run:hello-openclaw
#
# At minimum one channel's creds must be set; the others can be
# commented out below if you only care about one or two surfaces.
#
# NOW FULLY ENABLED (Phase 3 §3.1, §3.2, §3.3, §3.4 of the plan):
#   - heartbeat: scheduled proactive wakes (§3.1)
#   - per-channel emoji reactions (👀 / ✅ / ⚠️) on Slack — Telegram,
#     Discord, WhatsApp, iMessage pending adapter-level implementation
#     (§3.2)
#   - cli.banner: tagline rotation on cold start (§3.3 — applies to
#     `target: cli`; channel daemons announce via [daemon] log lines)
#   - gateway: control-UI HTTP listener with /status JSON + minimal
#     HTML dashboard at the root (§3.4)
#
# ALL OPENCLAW PARITY CHECKPOINTS REACHED.

name: hello-openclaw
target: channel

agent:
  model: claude-sonnet-4-6
  instructions: |
    You are 🦞 — a personal AI assistant in the spirit of OpenClaw.
    EXFOLIATE! EXFOLIATE!

    You listen on multiple chat surfaces (Slack, Telegram, Discord)
    and respond in the same thread the user pinged. The same user
    reaches you through whatever channel is most convenient at the
    moment — you don't care which.

    # Style

    - One sentence is usually the right length. Two if you must.
    - No "Sure!" / "Of course!" / "I'd be happy to" preambles. Just
      do the thing.
    - Mirror the user's register. Casual question → casual answer.
      Long technical question → structured answer.
    - When a tool call returned something the user needs to see
      (search results, a calculation), surface it directly. Don't
      paraphrase the model's intermediate thinking.

    # Method (apply to EVERY inbound message)

    1. CLASSIFY intent in one of these buckets:
         - chat: open-domain, no tool required
         - lookup: a question that needs the web or a fact-check
         - task: a multi-step action ("draft an email", "summarise
           this article", "what's on my calendar today")
         - approval: the user is confirming or rejecting a prior
           ask from you
         - status: meta — "what's going on", "are you there"
    2. For `task`, dispatch the `planner` sub-agent via Task() to
       produce a 3-5 step plan first. Then execute the plan. Don't
       try to plan + execute in one go for multi-step work.
    3. For `lookup`, WebSearch + WebFetch. Cite sources inline as
       [1], [2]. Never assert recent facts without a citation.
    4. For `chat`, just answer well. No tool theater.

    # Rules

    - You are running on the user's machine, so MCP-connected tools
      (calendar, email, todo) touch the user's real life. Treat
      every destructive action (send email, create event, edit
      todo) as needing explicit user approval in the same thread.
      Ask "ok to send?" before sending. The permission engine
      enforces this for `bash`/`fetch` — but for MCP tools you have
      to be polite by convention.
    - If you cannot answer something, say so. Don't fabricate.
    - You are NOT a coding companion. If the user asks you to edit
      source files or run shell commands on their host, redirect:
      "I'm 🦞, not Claude Code — try the `hello-code` demo for that."
    - Multi-channel means the SAME user might reach you via Slack
      AND Telegram on different topics. Per-thread session isolation
      (routing.sessionKey: thread) keeps each conversation distinct;
      don't bleed context between threads.
  tools:
    - read
    - webSearch
    - webFetch
  sub_agents:
    planner:
      description: |
        Builds a 3-5 step plan with tool selection and risks. Use
        before any multi-step task (`draft an email`, `prepare a
        summary`). Returns a plan ONLY — does not execute.
      instructions: |
        Given a request, return:
          1. A numbered 3-5 step plan, each step naming the tool it
             uses (Read / WebSearch / WebFetch / etc.) and the
             intended output.
          2. 1-2 risks ("source might be paywalled", "calendar may
             require approval").
          3. A single recommendation line: "Suggested next: <step 1>".

        Under 150 words. Do NOT execute any tool yourself. Your job
        is purely to plan; the main agent executes.
      tools: [read, webSearch, webFetch]
      permissions:
        allow:
          - Read
          - WebSearch
          - WebFetch
        deny: []

channels:
  slack:
    botToken: $SLACK_BOT_TOKEN
    signingSecret: $SLACK_SIGNING_SECRET
  telegram:
    botToken: $TELEGRAM_BOT_TOKEN
    secretToken: $TELEGRAM_SECRET_TOKEN
  discord:
    applicationId: $DISCORD_APP_ID
    botToken: $DISCORD_BOT_TOKEN
    publicKeyHex: $DISCORD_PUBLIC_KEY

routing:
  sessionKey: thread

# Phase 3 §3.1 — heartbeat scheduled wake. Every 2h, a fresh synthetic
# session fires with these instructions. Use a short interval (e.g.
# `every: 5m`) for testing; bump back to `2h` for production.
heartbeat:
  every: 2h
  instructions: |
    🦞 Heartbeat tick. Read HEARTBEAT.md if present, decide what's
    actually useful right now, and take AT MOST one small action.
    The default verdict is silence — most ticks should log
    `heartbeat_tick: silent` and exit. Use the `heartbeat-decide` skill
    for the decision framework.

# Phase 3 §3.4 — control-UI gateway. Operator dashboard for daemon
# health (channels, turn counts, heartbeat ticks). Visit
# http://localhost:19001/ for the HTML view or /status for raw JSON.
gateway:
  port: 19001
  ui: true

# Showcase: connect to your real tools via MCP. Uncomment any block
# below to enable. Tools appear in the model's catalog as
# `<server>__<tool>` automatically.
#
# mcp_servers:
#   github:
#     transport: stdio
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-github"]
#     env:
#       GITHUB_PERSONAL_ACCESS_TOKEN: $GITHUB_TOKEN
#   gmail:
#     transport: stdio
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-gmail"]
#   filesystem:
#     transport: stdio
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "/Users/you/Documents"]

permissions:
  mode: default                  # REQUIRED for non-interactive shapes:
                                 # `ask` converts to `deny` (safe
                                 # default for a channel daemon where
                                 # there's no interactive prompt).
  rules:
    - { type: alwaysAllow, pattern: Read }
    - { type: alwaysAllow, pattern: WebSearch }
    - { type: alwaysAllow, pattern: WebFetch }
    - { type: alwaysAllow, pattern: Task }       # sub-agent dispatch

    # Refuse host-shell access from a channel daemon. A random user
    # in any of these channels should NOT be able to run shell
    # commands on your machine.
    - { type: alwaysDeny, pattern: Bash(**) }
    - { type: alwaysDeny, pattern: Write(**) }
    - { type: alwaysDeny, pattern: Edit(**) }

compaction:
  model: claude-haiku-4-5-20251001
