name: Walkthroughs

on:
  push:
    branches: [main]
    paths:
      - "walkthroughs/**"
      - "GETTING-STARTED.md"
      - "scripts/test-walkthroughs.ts"
      - "scripts/smoke-walkthroughs.ts"
      - "starters/**/crewhaus.yaml"
      - "smoke/**/crewhaus.yaml"
      - ".github/workflows/walkthroughs.yml"
  pull_request:
    branches: [main]
    paths:
      - "walkthroughs/**"
      - "GETTING-STARTED.md"
      - "scripts/test-walkthroughs.ts"
      - "scripts/smoke-walkthroughs.ts"
      - "starters/**/crewhaus.yaml"
      - "smoke/**/crewhaus.yaml"
      - ".github/workflows/walkthroughs.yml"

permissions:
  contents: read

jobs:
  static:
    name: Static walkthrough validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demos
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: demos
      - name: Checkout factory (sibling — required for the compiler CLI)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: crewhaus/factory
          path: factory
      # If the demos PR's branch name also exists in factory, check that
      # out — it lets cross-repo PRs (e.g. a spec field added to factory
      # consumed by a new demo) test together. Falls back silently to
      # factory's default branch when no matching branch exists.
      - name: Match factory branch to demos PR branch when present
        if: github.head_ref != ''
        working-directory: factory
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "[recipes-ci] factory has matching branch $BRANCH — checking out"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "[recipes-ci] no factory branch named $BRANCH; staying on default"
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ">=1.2.0"
      - name: Install factory deps (workspace setup)
        working-directory: factory
        run: bun install --frozen-lockfile
      - name: Install demos deps
        working-directory: demos
        run: bun install --frozen-lockfile
      - name: Run static recipe tests
        working-directory: demos
        run: bun run walkthroughs:test

  smoke:
    name: Walkthrough compile smoke (no model calls)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout demos
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: demos
      - name: Checkout factory (sibling — required for the compiler CLI)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: crewhaus/factory
          path: factory
      - name: Match factory branch to demos PR branch when present
        if: github.head_ref != ''
        working-directory: factory
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "[recipes-ci] factory has matching branch $BRANCH — checking out"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "[recipes-ci] no factory branch named $BRANCH; staying on default"
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ">=1.2.0"
      - name: Install factory deps (workspace setup)
        working-directory: factory
        run: bun install --frozen-lockfile
      - name: Install demos deps
        working-directory: demos
        run: bun install --frozen-lockfile
      - name: Run compile-only smoke for recipes with bun_scripts
        working-directory: demos
        run: bun run walkthroughs:smoke
