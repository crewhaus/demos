name: example-corpus

# Section 40 — matrix CI gate that compiles every */crewhaus.yaml in this repo
# end-to-end (every hello-* example). Catches drift the moment any spec stops
# parsing, lowering, or emitting a clean bundle. Asserts:
#   - `crewhaus compile <spec>` exits 0 within 60s
#   - the emitted directory contains at least one `.ts` file
#   - the emitted entry imports cleanly (Bun parses the bundle without
#     executing it — daemon-shape examples don't need --dry-run because
#     compile alone exercises the full lower → emit pipeline)
#
# Requires a sibling crewhaus/factory checkout to supply the compiler CLI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.list.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        name: Enumerate */crewhaus.yaml and smoke/*/crewhaus.yaml
        run: |
          set -euo pipefail
          # Walks hello-*/ at depth 2 and smoke/section-*-smoke/ at depth 3.
          # Excludes node_modules/, scripts/, .github/, .crewhaus/ — none
          # of which carry compilable specs.
          examples=$(
            {
              find . -mindepth 2 -maxdepth 2 -name crewhaus.yaml \
                -not -path "./node_modules/*" \
                -not -path "./scripts/*" \
                -not -path "./smoke/*" \
                -not -path "./.github/*" \
                -not -path "./.crewhaus/*"
              find ./smoke -mindepth 2 -maxdepth 2 -name crewhaus.yaml \
                -not -path "*/node_modules/*"
            } \
              | sed 's|^\./||;s|/crewhaus.yaml||' \
              | sort \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$examples" | jq 'length') examples"

  compile:
    needs: enumerate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.enumerate.outputs.examples) }}
    steps:
      - name: Checkout demos
        uses: actions/checkout@v4
        with:
          path: demos
      - name: Checkout factory (sibling — required for the compiler CLI)
        uses: actions/checkout@v4
        with:
          repository: crewhaus/factory
          path: factory
          token: ${{ secrets.CREWHAUS_REPO_TOKEN }}
      # If the demos PR's branch name also exists in factory, check that
      # out — lets cross-repo PRs (e.g. a spec field added to factory
      # consumed by a new demo) test together. Falls back silently to
      # factory's default branch when no matching branch exists.
      - name: Match factory branch to demos PR branch when present
        if: github.head_ref != ''
        working-directory: factory
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "[example-corpus] factory has matching branch $BRANCH — checking out"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "[example-corpus] no factory branch named $BRANCH; staying on default"
          fi
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.2.0"

      - name: Install factory deps (workspace setup)
        working-directory: factory
        run: bun install --frozen-lockfile
      - name: Install demos deps
        working-directory: demos
        run: bun install --frozen-lockfile

      - name: Compile demos/${{ matrix.example }}/crewhaus.yaml
        timeout-minutes: 1
        run: |
          out="/tmp/${{ matrix.example }}"
          rm -rf "$out"
          mkdir -p "$out"
          # Catch a hung compile early via the 60s timeout(1) wrapper.
          timeout 60s bun factory/apps/cli/src/index.ts compile \
            "demos/${{ matrix.example }}/crewhaus.yaml" \
            -o "$out"

      - name: Verify bundle has at least one .ts file
        run: |
          out="/tmp/${{ matrix.example }}"
          ts_count=$(find "$out" -maxdepth 1 -name "*.ts" | wc -l)
          if [ "$ts_count" -lt 1 ]; then
            echo "::error::expected at least one .ts file in $out"
            ls -la "$out"
            exit 1
          fi
          echo "$ts_count .ts file(s) emitted"

      - name: Verify entry contains the expected codegen markers
        run: |
          out="/tmp/${{ matrix.example }}"
          first=$(find "$out" -maxdepth 1 -name "*.ts" | head -1)
          if [ -z "$first" ]; then
            echo "::error::no .ts file to verify"
            exit 1
          fi
          # Every emitted bundle carries this marker — the §1 codegen
          # template prepends it. Surfaces drift in the codegen path
          # without needing a full transpile (which would require
          # workspace-relative module resolution that GitHub Actions
          # runners don't have set up at /tmp).
          grep -q "DO NOT EDIT" "$first"

  status:
    needs: compile
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate compile-matrix status
        run: |
          if [ "${{ needs.compile.result }}" != "success" ]; then
            echo "::error::example-corpus matrix failed"
            exit 1
          fi
          echo "All examples compiled cleanly."
