name: Recipes

on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "GETTING-STARTED.md"
      - "scripts/test-recipes.ts"
      - "scripts/smoke-recipes.ts"
      - "*/crewhaus.yaml"
      - ".github/workflows/recipes.yml"
  pull_request:
    branches: [main]
    paths:
      - "recipes/**"
      - "GETTING-STARTED.md"
      - "scripts/test-recipes.ts"
      - "scripts/smoke-recipes.ts"
      - "*/crewhaus.yaml"
      - ".github/workflows/recipes.yml"

jobs:
  static:
    name: Static recipe validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demos
        uses: actions/checkout@v4
        with:
          path: demos
      - name: Checkout factory (sibling — required for the compiler CLI)
        uses: actions/checkout@v4
        with:
          repository: crewhaus/factory
          path: factory
          token: ${{ secrets.CREWHAUS_REPO_TOKEN }}
      # If the demos PR's branch name also exists in factory, check that
      # out — it lets cross-repo PRs (e.g. a spec field added to factory
      # consumed by a new demo) test together. Falls back silently to
      # factory's default branch when no matching branch exists.
      - name: Match factory branch to demos PR branch when present
        if: github.head_ref != ''
        working-directory: factory
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "[recipes-ci] factory has matching branch $BRANCH — checking out"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "[recipes-ci] no factory branch named $BRANCH; staying on default"
          fi
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.2.0"
      - name: Install factory deps (workspace setup)
        working-directory: factory
        run: bun install --frozen-lockfile
      - name: Install demos deps
        working-directory: demos
        run: bun install --frozen-lockfile
      - name: Run static recipe tests
        working-directory: demos
        run: bun run recipes:test

  smoke:
    name: Recipe compile smoke (no model calls)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout demos
        uses: actions/checkout@v4
        with:
          path: demos
      - name: Checkout factory (sibling — required for the compiler CLI)
        uses: actions/checkout@v4
        with:
          repository: crewhaus/factory
          path: factory
          token: ${{ secrets.CREWHAUS_REPO_TOKEN }}
      - name: Match factory branch to demos PR branch when present
        if: github.head_ref != ''
        working-directory: factory
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "[recipes-ci] factory has matching branch $BRANCH — checking out"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "[recipes-ci] no factory branch named $BRANCH; staying on default"
          fi
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.2.0"
      - name: Install factory deps (workspace setup)
        working-directory: factory
        run: bun install --frozen-lockfile
      - name: Install demos deps
        working-directory: demos
        run: bun install --frozen-lockfile
      - name: Run compile-only smoke for recipes with bun_scripts
        working-directory: demos
        run: bun run recipes:smoke
